<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </radialGradient>
    <radialGradient id="cellGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e85d8a" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c0395f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b1a3a" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="cellGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5dbde8" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#2a7fb0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d3d5c" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="cellGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8de85d" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#4aad20" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1d4a08" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="cellGlow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8b85d" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c07820" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5c3008" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="cellGlow5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b05de8" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7a28c0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3a0d5c" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="nucGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a4a7a"/>
      <stop offset="100%" stop-color="#0a1e3a"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle spatial grid -->
  <g opacity="0.06" stroke="#4488cc" stroke-width="0.5">
    <line x1="0" y1="80" x2="500" y2="80"/>
    <line x1="0" y1="160" x2="500" y2="160"/>
    <line x1="0" y1="240" x2="500" y2="240"/>
    <line x1="0" y1="320" x2="500" y2="320"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="500"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>

  <!-- Cell communication lines -->
  <g opacity="0.25" stroke-width="1">
    <line x1="250" y1="210" x2="155" y2="165" stroke="#e85d8a" stroke-dasharray="3,3"/>
    <line x1="250" y1="210" x2="345" y2="165" stroke="#5dbde8" stroke-dasharray="3,3"/>
    <line x1="250" y1="210" x2="150" y2="290" stroke="#8de85d" stroke-dasharray="3,3"/>
    <line x1="250" y1="210" x2="350" y2="295" stroke="#e8b85d" stroke-dasharray="3,3"/>
    <line x1="250" y1="210" x2="250" y2="135" stroke="#b05de8" stroke-dasharray="3,3"/>
  </g>

  <!-- Satellite cell - top (purple) -->
  <circle cx="250" cy="128" r="32" fill="url(#cellGlow5)" opacity="0.3"/>
  <circle cx="250" cy="128" r="22" fill="#1a0a2e" stroke="#b05de8" stroke-width="1.5"/>
  <circle cx="250" cy="128" r="8" fill="#7a28c0" opacity="0.8"/>
  <circle cx="246" cy="124" r="3" fill="#d0a0ff" opacity="0.9"/>

  <!-- Satellite cell - top-left (pink) -->
  <circle cx="148" cy="168" r="30" fill="url(#cellGlow1)" opacity="0.3"/>
  <circle cx="148" cy="168" r="20" fill="#1e0810" stroke="#e85d8a" stroke-width="1.5"/>
  <circle cx="148" cy="168" r="7" fill="#c0395f" opacity="0.8"/>
  <circle cx="145" cy="165" r="2.5" fill="#ffaac8" opacity="0.9"/>

  <!-- Satellite cell - top-right (blue) -->
  <circle cx="352" cy="168" r="30" fill="url(#cellGlow2)" opacity="0.3"/>
  <circle cx="352" cy="168" r="20" fill="#08131e" stroke="#5dbde8" stroke-width="1.5"/>
  <circle cx="352" cy="168" r="7" fill="#2a7fb0" opacity="0.8"/>
  <circle cx="349" cy="165" r="2.5" fill="#a0d8ff" opacity="0.9"/>

  <!-- Satellite cell - bottom-left (green) -->
  <circle cx="145" cy="295" r="28" fill="url(#cellGlow3)" opacity="0.3"/>
  <circle cx="145" cy="295" r="19" fill="#0a1a05" stroke="#8de85d" stroke-width="1.5"/>
  <circle cx="145" cy="295" r="6.5" fill="#4aad20" opacity="0.8"/>
  <circle cx="142" cy="292" r="2.5" fill="#c0ff90" opacity="0.9"/>

  <!-- Satellite cell - bottom-right (orange) -->
  <circle cx="355" cy="298" r="28" fill="url(#cellGlow4)" opacity="0.3"/>
  <circle cx="355" cy="298" r="19" fill="#1a0e05" stroke="#e8b85d" stroke-width="1.5"/>
  <circle cx="355" cy="298" r="6.5" fill="#c07820" opacity="0.8"/>
  <circle cx="352" cy="295" r="2.5" fill="#ffe0a0" opacity="0.9"/>

  <!-- Central tumor cell -->
  <circle cx="250" cy="210" r="60" fill="url(#cellGlow1)" opacity="0.2"/>
  <circle cx="250" cy="210" r="52" fill="#120508" stroke="#e85d8a" stroke-width="2" filter="url(#glow)"/>
  <circle cx="235" cy="198" r="6" fill="#3a1020" opacity="0.6"/>
  <circle cx="265" cy="222" r="5" fill="#3a1020" opacity="0.5"/>
  <circle cx="258" cy="195" r="4" fill="#3a1020" opacity="0.4"/>
  <circle cx="238" cy="225" r="4" fill="#3a1020" opacity="0.4"/>
  <!-- Nucleus -->
  <circle cx="250" cy="210" r="24" fill="url(#nucGrad)" stroke="#2a6aaa" stroke-width="1.5"/>
  <circle cx="244" cy="205" r="3" fill="#4a9de8" opacity="0.9"/>
  <circle cx="255" cy="208" r="2.5" fill="#6ab8f0" opacity="0.8"/>
  <circle cx="248" cy="216" r="2" fill="#4a9de8" opacity="0.7"/>
  <circle cx="258" cy="215" r="2" fill="#6ab8f0" opacity="0.6"/>
  <!-- Nucleolus -->
  <circle cx="250" cy="209" r="8" fill="#1a5080" opacity="0.9" stroke="#3a7ab0" stroke-width="1"/>

  <!-- DNA double helix -->
  <g filter="url(#glow)" opacity="0.75">
    <path d="M 190 358 Q 205 347 220 358 Q 235 369 250 358 Q 265 347 280 358 Q 295 369 310 358"
          fill="none" stroke="#e85d8a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 190 372 Q 205 383 220 372 Q 235 361 250 372 Q 265 383 280 372 Q 295 361 310 372"
          fill="none" stroke="#5dbde8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="205" y1="350" x2="205" y2="380" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
    <line x1="220" y1="358" x2="220" y2="372" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
    <line x1="250" y1="358" x2="250" y2="372" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
    <line x1="280" y1="358" x2="280" y2="372" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
    <line x1="295" y1="350" x2="295" y2="380" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
    <line x1="235" y1="364" x2="235" y2="365" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
    <line x1="265" y1="364" x2="265" y2="365" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- Single-cell UMAP scatter clusters -->
  <g opacity="0.6" filter="url(#glow)">
    <!-- pink cluster -->
    <circle cx="88" cy="355" r="3" fill="#e85d8a"/>
    <circle cx="96" cy="347" r="2.5" fill="#e85d8a"/>
    <circle cx="104" cy="360" r="3" fill="#e85d8a"/>
    <circle cx="92" cy="366" r="2" fill="#e85d8a"/>
    <circle cx="100" cy="341" r="2" fill="#e85d8a"/>
    <!-- blue cluster -->
    <circle cx="118" cy="352" r="3" fill="#5dbde8"/>
    <circle cx="126" cy="344" r="2.5" fill="#5dbde8"/>
    <circle cx="130" cy="358" r="2" fill="#5dbde8"/>
    <circle cx="122" cy="362" r="2.5" fill="#5dbde8"/>
    <!-- green cluster -->
    <circle cx="108" cy="378" r="3" fill="#8de85d"/>
    <circle cx="116" cy="372" r="2" fill="#8de85d"/>
    <circle cx="100" cy="374" r="2.5" fill="#8de85d"/>
    <circle cx="120" cy="382" r="2" fill="#8de85d"/>
    <!-- orange cluster -->
    <circle cx="138" cy="366" r="3" fill="#e8b85d"/>
    <circle cx="144" cy="358" r="2" fill="#e8b85d"/>
    <circle cx="134" cy="375" r="2.5" fill="#e8b85d"/>
    <!-- purple cluster -->
    <circle cx="80" cy="372" r="2.5" fill="#b05de8"/>
    <circle cx="86" cy="380" r="2" fill="#b05de8"/>
    <circle cx="76" cy="362" r="2" fill="#b05de8"/>
  </g>

  <!-- Text -->
  <text x="250" y="432" text-anchor="middle" font-size="36" font-weight="bold"
        letter-spacing="8" fill="#ffffff" filter="url(#strongGlow)" opacity="0.95">YU LAB</text>
  <text x="250" y="458" text-anchor="middle" font-size="11" letter-spacing="3"
        fill="#7ec8f0" opacity="0.85" font-family="'Courier New', monospace">COMPUTATIONAL CANCER GENOMICS</text>
  <text x="250" y="480" text-anchor="middle" font-size="9.5" letter-spacing="2"
        fill="#8899aa" opacity="0.65" font-family="Georgia, serif">Temple University</text>
</svg>
